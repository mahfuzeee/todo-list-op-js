<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Todo App</title>
  </head>
  <body>
    <!-- Sidebar for Projects -->
    <div id="sidebar">
      <h1>My Todos</h1>
      <ul id="project-list"></ul>
      <button id="new-project-btn">+ New Project</button>
    </div>

    <!-- Main Content for Todos -->
    <div id="main-content">
      <div id="main-header">
        <h2 id="current-project-title">Default</h2>
        <button id="new-todo-btn">+ New Todo</button>
      </div>
      <ul id="todo-list"></ul>
    </div>

    <!-- Modal for Adding/Editing Todos and Projects -->
    <div id="modal-overlay">
      <div id="modal-content"></div>
    </div>
  </body>
</html>
